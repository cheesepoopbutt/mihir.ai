<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mihir.ai</title>
    <!-- ... [KEEP YOUR EXISTING <style> SECTION THE SAME] ... -->
</head>
<body>
    <!-- ... [KEEP YOUR EXISTING HTML STRUCTURE THE SAME] ... -->

    <script>
        const CURRENT_VERSION = "2.3"; 
        
        // ... [KEEP ALL YOUR EXISTING JAVASCRIPT SETUP AND EVENT LISTENERS] ...

        // MODIFIED: No 'apiKey' variable here anymore.
        
        // ... [KEEP getMode, updateVisualStyles, speak functions] ...

        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const textContent = userInput.value.trim();
            if (!textContent) return;
            appendMessage(textContent, 'user-message');
            
            const mode = getMode(textContent);
            const isNice = niceToggle.checked;
            const isShort = lengthToggle.checked;
            
            let systemContent = mode === 'jason' ? jasonSystemPrompt : (mode === 'ryu' ? ryuSystemPrompt : (isNice ? niceSystemPrompt : meanSystemPrompt));
            systemContent += isShort ? shortAnswerModifier : mediumAnswerModifier;
            
            const payloadMessages = [{ role: "system", content: systemContent }, ...chatMessages, { role: "user", content: textContent }];
            updateVisualStyles(mode);
            userInput.value = '';
            sendBtn.disabled = true;
            const loadingDiv = appendMessage("Thinking...", 'bot-message');
            
            try {
                // MODIFIED: Pointing to the Vercel backend route instead of Groq directly
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: payloadMessages })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const botReply = data.choices[0].message.content.trim();
                
                loadingDiv.textContent = botReply;
                speak(botReply, mode);
                chatMessages.push({ role: "user", content: textContent });
                chatMessages.push({ role: "assistant", content: botReply });
            } catch (err) { loadingDiv.textContent = "Error: " + err.message; } finally { sendBtn.disabled = false; chatWindow.scrollTop = chatWindow.scrollHeight; }
        });

        // ... [KEEP YOUR appendMessage function] ...
    </script>
</body>
</html>
