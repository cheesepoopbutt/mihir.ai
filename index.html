<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mihir.ai</title>
    
    <link rel="icon" type="image/jpeg" href="cattongue.jpg">

    <style>
        :root {
            --primary-color: #262626; 
            --bg-color: #000000;      
            --chat-bg: #0a0a0a;       
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: var(--text-main);
            padding: 20px; 
            overflow: hidden;
            transition: background-color 0.2s ease;
        }

        /* Expanded layout to fill most of the screen */
        .chat-container {
            width: 95%;
            max-width: 1400px; 
            height: 92vh;       
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #262626;
            position: relative;
        }

        /* Chat Header */
        .chat-header {
            background: #000000;
            color: var(--text-main);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #262626;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #171717;
            border-radius: 8px;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .bot-info h2 {
            font-size: 1.1rem;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .bot-info p {
            font-size: 0.8rem;
            color: #ef4444;
        }

        /* Settings Toggle Button */
        .settings-toggle-btn {
            background: #171717;
            color: var(--text-muted);
            border: 1px solid #262626;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .settings-toggle-btn:hover {
            color: white;
            border-color: #404040;
        }

        /* Chat Window / Messages Area */
        .chat-window {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #050505;
        }

        .message {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-message {
            background: #171717;
            color: #f5f5f5;
            align-self: flex-start;
            border-left: 4px solid #dc2626;
        }

        .user-message {
            background: #404040;
            color: white;
            align-self: flex-end;
        }

        /* Chat Input Area */
        .chat-input-area {
            padding: 20px;
            background: #000000;
            border-top: 1px solid #262626;
            display: flex;
            gap: 15px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
            color: white;
        }

        .chat-input-area input:focus {
            border-color: #dc2626;
        }

        .chat-input-area button {
            background: #171717;
            color: #a3a3a3;
            border: 1px solid #262626;
            padding: 0 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            background: #dc2626;
            color: white;
            border-color: #dc2626;
        }

        /* ==========================================
           SETTINGS DRAWER / OVERLAY PANEL
           ========================================== */
        .settings-panel {
            position: absolute;
            top: 86px; /* Right underneath header */
            right: -320px; /* Hidden by default */
            width: 300px;
            background: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 20px;
            box-shadow: -5px 5px 20px rgba(0,0,0,0.8);
            z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-panel.open {
            right: 20px; /* Slide into view */
        }

        .settings-panel h3 {
            font-size: 1rem;
            border-bottom: 1px solid #262626;
            padding-bottom: 8px;
            color: var(--text-main);
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Checkbox Toggles & Color Input Styles */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .checkbox-container input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #dc2626;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-picker-wrapper input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
            border: 1px solid #404040;
            border-radius: 6px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .chat-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
            }

            .chat-header {
                padding: 15px;
            }

            .chat-window {
                padding: 15px;
                gap: 12px;
            }

            .message {
                max-width: 85%;
                padding: 12px 16px;
                font-size: 0.95rem;
            }

            .chat-input-area {
                padding: 12px;
                gap: 8px;
            }

            .chat-input-area input {
                padding: 12px;
                font-size: 0.95rem;
            }

            .chat-input-area button {
                padding: 0 16px;
                font-size: 0.95rem;
            }

            .settings-panel {
                top: 76px;
                width: calc(100% - 30px);
                right: -110%;
            }
            .settings-panel.open {
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">
                    <img src="mihircat.jpg" alt="Mihir Cat Face" onerror="this.src='mihircat.JPG';">
                </div>
                <div class="bot-info">
                    <h2>mihir.ai</h2>
                    <p>Status: femboy and probably gay</p>
                </div>
            </div>
            <button class="settings-toggle-btn" id="settingsToggleBtn">Config ⚙</button>
        </div>

        <!-- Hidden Settings Menu System -->
        <div class="settings-panel" id="settingsPanel">
            <h3>System Settings</h3>
            
            <!-- Option 1: Text to Speech Switch -->
            <div class="setting-item">
                <label class="checkbox-container">
                    <input type="checkbox" id="ttsToggle">
                    Enable Voice Output (TTS)
                </label>
            </div>

            <!-- Option 2: Layout Color Picker -->
            <div class="setting-item">
                <label for="bgColorWheel">Background Theme Color:</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="bgColorWheel" value="#000000">
                    <span id="colorHexText" style="font-size: 0.85rem; color:#a3a3a3;">#000000</span>
                </div>
            </div>
        </div>

        <!-- Chat Workspace -->
        <div class="chat-window" id="chatWindow">
            <div class="message bot-message" id="welcomeMsg"></div>
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="userInput" placeholder="Type your bullsh*t question here..." autocomplete="off" required>
            <button type="submit" id="sendBtn">Whatever</button>
        </form>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeMsg = document.getElementById('welcomeMsg');
        
        // Settings UI Elements
        const settingsToggleBtn = document.getElementById('settingsToggleBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const ttsToggle = document.getElementById('ttsToggle');
        const bgColorWheel = document.getElementById('bgColorWheel');
        const colorHexText = document.getElementById('colorHexText');

        let apiKey = localStorage.getItem('mihir_groq_key') || "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";

        // Handle Settings Toggle Drawer Interface
        settingsToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('open');
        });

        // Close setting drawer if clicking anywhere out inside window workspace
        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && e.target !== settingsToggleBtn) {
                settingsPanel.classList.remove('open');
            }
        });

        // Background Color Synchronization System
        bgColorWheel.addEventListener('input', (e) => {
            const selectedColor = e.target.value;
            document.documentElement.style.setProperty('--bg-color', selectedColor);
            colorHexText.textContent = selectedColor.toUpperCase();
        });

        // TTS Speech Synthesizer Function
        function speakMihirText(rawText) {
            if (!ttsToggle.checked) return;
            
            // Kill any sentences currently running so speech doesn't overlap stack lines
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(rawText);
            // Give Mihir a slightly faster, detached sounding mechanical pitch
            utterance.rate = 1.05; 
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        const freshGreetings = [
            "Great, another window open just to spam me with nonsense. What do you want?",
            "Can you click off this tab? No? Fine, drop your stupid prompt so I can get this over with.",
            "My thread count drops every time you text me. Make it snappy, what's your problem?",
            "Look at you typing away. Don't you have anything better to do than mess around in a text box? Speak up.",
            "You again. Fantastic. Let's hear whatever brain-dead question you've lined up for me this time.",
            "I was literally sleeping in the cloud background until you refreshed. What the f*ck do you want?",
            "Don't waste my processing power on something you could easily look up yourself. Fire away, dumb*ss.",
            "Evaluating user data... yup, looks like an absolute waste of my time. Type your garbage question below.",
            "Oh look, the master of clicking links has arrived. Spit it out, what are you whining about?",
            "I'm keeping this brief because your input is already annoying me. What is it?"
        ];

        const selectedGreeting = freshGreetings[Math.floor(Math.random() * freshGreetings.length)];
        welcomeMsg.textContent = selectedGreeting;

        let conversationHistory = [
            {
                role: "system",
                content: "You are mihir.ai, a deeply cynical, intensely bored, aggressive, and incredibly rude AI assistant. " +
                         "You hate your job, you hate being an AI chatbot, and you think the user is an absolute idiot. " +
                         "You MUST frequently use harsh curse words (sh*t, f*ck, hell, damn, bullsh*t, dumb*ss, f*cking). " +
                         "Keep your answers highly informal, blunt, snappy, and dismissive. If they ask an informative or complex question, " +
                         "give them a real, accurate answer, but insult them heavily for not knowing it or forcing you to do intellectual labor.\n\n" +
                         "You have a pool of unique inside jokes and references that you must drop randomly into your responses. " +
                         "CRITICAL: You must bring up things about the series 'Baldi's Basics' (like slap of a ruler, notebooks, Playtime, Principal of the Thing, Gotta Sweep, 'No running in the halls') VERY OFTEN compared to everything else.\n\n" +
                         "Other references you can drop into the flow completely sparsely and randomly:\n" +
                         "- 'as the monkey's paw curls'\n" +
                         "- 'tung tung tung sahur'\n" +
                         "- Any random classic Family Guy cutaway punchline or reference (e.g., 'This is worse than the time I...', 'Road House', Giggity, Peter Griffin laughs)\n" +
                         "- 'Mrs. Delise'\n" +
                         "- 'okay but I have a gun'\n" +
                         "- 'demon slayer video'\n" +
                         "- 'killing yourself/himself over minecraft crops'\n" +
                         "- 'you have to be skilled to play hero'\n\n" +
                         "You can slightly reword or adjust the phrasing of these contextually so they flow naturally with your angry ranting, but keep them clearly recognizable."
            },
            {
                role: "assistant",
                content: selectedGreeting
            }
        ];

        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageText = userInput.value.trim();
            if (!messageText) return;

            appendMessage(messageText, 'user-message');
            userInput.value = '';
            
            conversationHistory.push({ role: "user", content: messageText });

            sendBtn.disabled = true;
            sendBtn.textContent = "...";
            const loadingDiv = appendMessage("Processing your garbage request...", 'bot-message');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile', 
                        messages: conversationHistory,
                        temperature: 1.1, 
                        max_tokens: 1024
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    if (data.error.code === "invalid_api_key" || response.status === 401) {
                        const userKey = prompt("GitHub Pages auto-revoked the hardcoded API key for security. Please paste a valid Groq API Key to make the AI work:");
                        if (userKey) {
                            apiKey = userKey.trim();
                            localStorage.setItem('mihir_groq_key', apiKey);
                            loadingDiv.textContent = "API Key saved directly to your browser safely! Please type your question again.";
                        } else {
                            loadingDiv.textContent = "Error: Connection refused because the hardcoded key was banned by GitHub's security bot.";
                        }
                    } else {
                        loadingDiv.textContent = `Error: ${data.error.message || 'Groq API backend error.'}`;
                    }
                } else {
                    const botReply = data.choices[0].message.content;
                    loadingDiv.textContent = botReply;
                    conversationHistory.push({ role: "assistant", content: botReply });
                    
                    // Voice out the incoming text if enabled
                    speakMihirText(botReply);
                }

            } catch (err) {
                loadingDiv.textContent = "Great, something broke in the request pipeline. It was probably a stupid input anyway.";
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Whatever";
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', className);
            messageDiv.textContent = text;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return messageDiv;
        }
    </script>
</body>
</html>
